version: '3.8'
services:
  backend:
    build:
      context: ./back
    env_file:
      - ./back/.env
    ports:
      - "3001:3001"

  frontend:
    build:
      context: ./vidaplus-front
    environment:
      - VITE_API_BASE_URL=http://backend:3001/api
    ports:
      - "5173:5173"
    depends_on:
      - backend
